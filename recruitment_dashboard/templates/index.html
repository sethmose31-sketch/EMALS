<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecruitEase ATS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">RecruitEase ATS</a>
      </div>
    </nav>

    <div class="container">
      <div class="row mb-3">
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>Total Applicants</h6>
              <h3>{{ stats.total }}</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>Average Experience</h6>
              <h3>{{ stats.avg_experience }} yrs</h3>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <canvas id="skillsChart"></canvas>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <table id="applicants-table" class="display" style="width:100%">
            <thead>
              <tr>
                <th>Name</th>
                <th>Title</th>
                <th>Experience</th>
                <th>Location</th>
                <th>Source</th>
                <th>View</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const topSkills = {{ stats.top_skills|tojson }};
    </script>
    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
